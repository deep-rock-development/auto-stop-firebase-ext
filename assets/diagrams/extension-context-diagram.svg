<svg width="1050" height="301" viewBox="0 0 1050 301" xmlns="http://www.w3.org/2000/svg">
  <!-- canvas + frame -->
  <rect x="0" y="0" width="1050" height="301" fill="#ffffff"/>
  <rect x="6" y="6" width="1038" height="289" fill="none" stroke="#dadce0" stroke-width="2" rx="2"/>

  <!-- title -->
  <text x="26" y="38" font-size="20" fill="#202124">Extension Context</text>

  <defs>
    <!-- flat-top hexagon, centered at 0,0, radius 34 -->
    <polygon id="hex" points="-34,0 -17,-29.4 17,-29.4 34,0 17,29.4 -17,29.4"/>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- ============ Billing Alert (blue circle + card + red badge) ============ -->
  <g transform="translate(85,150)">
    <circle r="34" fill="#4285f4"/>
    <!-- credit card glyph -->
    <rect x="-17" y="-11" width="34" height="22" rx="3" fill="#ffffff"/>
    <rect x="-17" y="-5" width="34" height="6" fill="#4285f4"/>
    <circle cx="9" cy="6" r="4" fill="#aecbfa"/>
    <!-- alert badge -->
    <circle cx="24" cy="-24" r="11" fill="#ea4335"/>
    <rect x="22.7" y="-30" width="2.6" height="8" rx="1.3" fill="#ffffff"/>
    <circle cx="24" cy="-19.5" r="1.6" fill="#ffffff"/>
    <text x="0" y="56" font-size="15" fill="#202124" text-anchor="middle">Billing Alert</text>
  </g>

  <!-- arrow 1 -->
  <line x1="124" y1="150" x2="232" y2="150" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="178" y="172" font-size="14" fill="#5f6368" text-anchor="middle">Push message</text>

  <!-- ============ Cloud Pub/Sub ============ -->
  <g transform="translate(280,150)">
    <use href="#hex" fill="#4285f4"/>
    <!-- pub/sub glyph: center node + three spokes -->
    <g stroke="#ffffff" stroke-width="2.4">
      <line x1="0" y1="0" x2="0" y2="-14"/>
      <line x1="0" y1="0" x2="-12" y2="9"/>
      <line x1="0" y1="0" x2="12" y2="9"/>
    </g>
    <circle cx="0" cy="0" r="5.5" fill="#ffffff"/>
    <circle cx="0" cy="-15" r="4" fill="#ffffff"/>
    <circle cx="-13" cy="10" r="4" fill="#ffffff"/>
    <circle cx="13" cy="10" r="4" fill="#ffffff"/>
    <text x="0" y="56" font-size="15" fill="#202124" text-anchor="middle">Cloud</text>
    <text x="0" y="75" font-size="15" fill="#202124" text-anchor="middle">Pub/Sub</text>
  </g>

  <!-- arrow 2 -->
  <line x1="320" y1="150" x2="438" y2="150" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="379" y="172" font-size="14" fill="#5f6368" text-anchor="middle">Subscriber</text>

  <!-- ============ Billing Action (Function) ============ -->
  <g transform="translate(486,150)">
    <use href="#hex" fill="#4285f4"/>
    <!-- function glyph: brackets + dots -->
    <text x="-16" y="8" font-size="24" fill="#ffffff" text-anchor="middle" font-family="Roboto Mono, monospace">(</text>
    <text x="16" y="8" font-size="24" fill="#ffffff" text-anchor="middle" font-family="Roboto Mono, monospace">)</text>
    <circle cx="-7" cy="0" r="2.4" fill="#ffffff"/>
    <circle cx="0" cy="0" r="2.4" fill="#ffffff"/>
    <circle cx="7" cy="0" r="2.4" fill="#ffffff"/>
    <text x="0" y="56" font-size="15" fill="#202124" text-anchor="middle">Billing Action</text>
    <text x="0" y="75" font-size="15" fill="#202124" text-anchor="middle">(Function)</text>
  </g>

  <!-- arrow 3 -->
  <line x1="526" y1="150" x2="672" y2="150" stroke="#9aa0a6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="599" y="172" font-size="14" fill="#5f6368" text-anchor="middle">Take action</text>

  <!-- ============ Billing API ============ -->
  <g transform="translate(720,150)">
    <use href="#hex" fill="#4285f4"/>
    <!-- API glyph: small hexagon outline + connectors -->
    <polygon points="-13,0 -6.5,-11.3 6.5,-11.3 13,0 6.5,11.3 -6.5,11.3" fill="none" stroke="#ffffff" stroke-width="2.4"/>
    <circle cx="0" cy="0" r="3.4" fill="#ffffff"/>
    <text x="0" y="56" font-size="15" fill="#202124" text-anchor="middle">Billing API</text>
  </g>

  <!-- action annotation -->
  <text x="775" y="143" font-size="15" fill="#5f6368">Stop by removing billing</text>
  <text x="775" y="164" font-size="15" fill="#5f6368">account from project</text>
</svg>
